services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stl
      POSTGRES_PASSWORD: stl_dev_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nexarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/nexarr-api/NexArr.Api/NexArr.Api.csproj
        ASSEMBLY_NAME: NexArr.Api
    ports:
      - "5101:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=nexarr;Username=stl;Password=stl_dev_password
    depends_on:
      postgres:
        condition: service_healthy

  staffarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/staffarr-api/StaffArr.Api/StaffArr.Api.csproj
        ASSEMBLY_NAME: StaffArr.Api
    ports:
      - "5102:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=staffarr;Username=stl;Password=stl_dev_password
    depends_on:
      postgres:
        condition: service_healthy

  trainarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/trainarr-api/TrainArr.Api/TrainArr.Api.csproj
        ASSEMBLY_NAME: TrainArr.Api
    ports:
      - "5103:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=trainarr;Username=stl;Password=stl_dev_password
      TrainArr__FrontendBaseUrl: http://127.0.0.1:5176
    depends_on:
      postgres:
        condition: service_healthy

  maintainarr-api:
