      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/maintainarr-api/MaintainArr.Api/MaintainArr.Api.csproj
        ASSEMBLY_NAME: MaintainArr.Api
    ports:
      - "5104:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=maintainarr;Username=stl;Password=stl_dev_password
      MaintainArr__FrontendBaseUrl: http://127.0.0.1:5178
    depends_on:
      postgres:
        condition: service_healthy

  routarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/routarr-api/RoutArr.Api/RoutArr.Api.csproj
        ASSEMBLY_NAME: RoutArr.Api
    ports:
      - "5105:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=routarr;Username=stl;Password=stl_dev_password
      RoutArr__FrontendBaseUrl: http://127.0.0.1:5180
    depends_on:
      postgres:
        condition: service_healthy

  supplyarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/supplyarr-api/SupplyArr.Api/SupplyArr.Api.csproj
