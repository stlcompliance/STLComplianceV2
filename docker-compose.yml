x-stl-integration-bootstrap: &stl-integration-bootstrap
  STL_INTEGRATION_TOKEN_AUTO_PROVISION: "true"
  STL_INTEGRATION_BOOTSTRAP_SECRET: stl-local-bootstrap-secret
  NexArr__BaseUrl: http://nexarr-api:8080

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stl
      POSTGRES_PASSWORD: stl_dev_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nexarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/nexarr-api/NexArr.Api/NexArr.Api.csproj
        ASSEMBLY_NAME: NexArr.Api
    ports:
      - "5101:8080"
    environment:
      <<: *stl-integration-bootstrap
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=nexarr;Username=stl;Password=stl_dev_password
      REDIS_URL: redis:6379
      OPENAI_ASSISTANT_MODEL: gpt-5.5
      OPENAI_SMART_IMPORT_MODEL: gpt-5.5
      TENANT_INTEGRATION_ENCRYPTION_KEY: stl-local-tenant-integration-encryption-key
      STL_SERVICE_NAME: nexarr-api
    depends_on:
      postgres:
        condition: service_healthy

  staffarr-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PROJECT_PATH: apps/staffarr-api/StaffArr.Api/StaffArr.Api.csproj
        ASSEMBLY_NAME: StaffArr.Api
    ports:
      - "5102:8080"
    environment:
      <<: *stl-integration-bootstrap
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: Host=postgres;Port=5432;Database=staffarr;Username=stl;Password=stl_dev_password
      STL_SERVICE_NAME: staffarr-api
    depends_on:
      postgres:
        condition: service_healthy

  trainarr-api:
