  nexarr-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        PROJECT_PATH: workers/nexarr-worker/NexArr.Worker/NexArr.Worker.csproj
        ASSEMBLY_NAME: NexArr.Worker
    environment:
      DOTNET_ENVIRONMENT: Development
    depends_on:
      - postgres
      - redis

  staffarr-worker:
