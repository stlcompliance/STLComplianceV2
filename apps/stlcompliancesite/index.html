<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var root = document.documentElement;
        var theme = 'dark';
        root.setAttribute('data-theme', theme);
        root.setAttribute('data-theme-preference', theme);
        root.classList.add('dark');
        root.classList.remove('light');
        root.style.colorScheme = theme;
        root.style.setProperty('color-scheme', theme);
      })();
    </script>
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="STL Compliance helps operations teams connect people, training, assets, dispatch, inventory, vendors, and compliance proof in one Adaptive Risk Reduction platform."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="STL Compliance" />
    <meta property="og:image" content="/brand/stl-full-bluebg.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>STL Compliance — Adaptive Risk Reduction Suite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
