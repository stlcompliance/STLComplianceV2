# Browser E2E overlay — use with base compose:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml --profile e2e up -d
# APIs use default services from docker-compose.yml; this file adds Vite preview frontends on 5174–5182.

x-frontend-e2e: &frontend-e2e
  profiles: [e2e]
  build:
    context: .
    dockerfile: docker/Dockerfile.frontend-e2e
  restart: unless-stopped

services:
  suite-frontend-e2e:
    <<: *frontend-e2e
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend-e2e
      args:
        FRONTEND_APP: suite-frontend
        PREVIEW_PORT: 5174
        API_PROXY_TARGET: http://nexarr-api:8080
    ports:
      - "5174:5174"
    depends_on:
      nexarr-api:
        condition: service_started

  staffarr-frontend-e2e:
    <<: *frontend-e2e
    build:
