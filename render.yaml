      - key: TrainArr__FrontendBaseUrl
        value: https://trainarr-frontend.onrender.com
      - key: EvidenceStorage__RootPath
        value: /var/data/trainarr-evidence
      - key: Handoff__ServiceToken
        sync: false
      - key: StaffArr__ServiceToken
        sync: false
