        value: https://compliancecore-api-w7e5.onrender.com
      - key: LOADARR_PUBLIC_API_URL
        value: https://loadarr-api.onrender.com

databases:
  - name: nexarr-db
    plan: basic-256mb
    databaseName: nexarr
    user: nexarr
  - name: staffarr-db
    plan: basic-256mb
    databaseName: staffarr
    user: staffarr
  - name: trainarr-db
    plan: basic-256mb
    databaseName: trainarr
    user: trainarr
  - name: maintainarr-db
    plan: basic-256mb
    databaseName: maintainarr
    user: maintainarr
  - name: routarr-db
    plan: basic-256mb
    databaseName: routarr
    user: routarr
  - name: supplyarr-db
    plan: basic-256mb
    databaseName: supplyarr
    user: supplyarr
  - name: compliancecore-db
    plan: basic-256mb
    databaseName: compliancecore
    user: compliancecore
  - name: loadarr-db
    plan: basic-256mb
    databaseName: loadarr
    user: loadarr

services:
  - type: keyvalue
    name: redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # --- APIs (Docker / .NET 10) ---
  - type: web
    name: nexarr-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/nexarr-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - fromGroup: stl-internal-api-urls
      - key: DATABASE_URL
        fromDatabase:
          name: nexarr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString
      - key: Cors__SuiteFrontendOrigin
        value: https://suite-frontend.onrender.com
      - key: Cors__CompanionFrontendOrigin
        value: https://companion-frontend-vf7o.onrender.com
      - key: Launch__Products__nexarr__BaseUrl
        value: https://suite-frontend.onrender.com
      - key: Launch__Products__staffarr__BaseUrl
        value: https://staffarr-frontend.onrender.com
      - key: Launch__Products__trainarr__BaseUrl
        value: https://trainarr-frontend.onrender.com
      - key: Launch__Products__maintainarr__BaseUrl
        value: https://maintainarr-frontend.onrender.com
      - key: Launch__Products__routarr__BaseUrl
        value: https://routarr-frontend.onrender.com
      - key: Launch__Products__supplyarr__BaseUrl
        value: https://supplyarr-frontend.onrender.com
      - key: Launch__Products__compliancecore__BaseUrl
        value: https://compliancecore-frontend.onrender.com
      - key: Launch__Products__loadarr__BaseUrl
        value: https://loadarr-frontend.onrender.com
      - key: Launch__Products__staffarr__LaunchPath
        value: /launch
      - key: Launch__Products__trainarr__LaunchPath
        value: /launch
      - key: Launch__Products__maintainarr__LaunchPath
        value: /launch
      - key: Launch__Products__routarr__LaunchPath
        value: /launch
      - key: Launch__Products__supplyarr__LaunchPath
        value: /launch
      - key: Launch__Products__compliancecore__LaunchPath
        value: /launch
      - key: Launch__Products__loadarr__LaunchPath
        value: /launch
      - key: Launch__Products__companion__BaseUrl
        value: https://companion-frontend-vf7o.onrender.com
      - key: Launch__Products__companion__LaunchPath
        value: /launch
      - key: CompanionWebPush__Subject
        value: mailto:companion-push@stlcompliance.com
      - key: CompanionWebPush__PublicKey
        sync: false
      - key: CompanionWebPush__PrivateKey
        sync: false

  - type: web
    name: staffarr-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/staffarr-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - fromGroup: stl-internal-api-urls
      - key: STL_INTEGRATION_TOKEN_AUTO_PROVISION
        value: "true"
      - key: STL_SERVICE_NAME
        value: staffarr-api
      - key: DATABASE_URL
        fromDatabase:
          name: staffarr-db
          property: connectionString
      - key: Cors__StaffArrFrontendOrigin
        value: https://staffarr-frontend.onrender.com
      - key: Handoff__ServiceToken
        sync: false
      - key: NexArr__ServiceToken
        sync: false
      - key: TrainArr__ServiceToken
        sync: false
      - key: SupplyArr__ServiceToken
        sync: false
      - key: MaintainArr__ServiceToken
        sync: false

  - type: web
