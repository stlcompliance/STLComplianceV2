# STL Compliance / Arr Suite — Render Blueprint (M1 foundation)
# Schema: https://render.com/schema/render.yaml.json

envVarGroups:
  - name: stl-shared
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: Information
      - key: OTEL_ENABLED
        value: "false"
  - name: stl-auth
    envVars:
      - key: JWT_ISSUER
        generateValue: true
      - key: JWT_AUDIENCE
        value: stl-compliance-suite
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: SERVICE_TOKEN_ISSUER
        generateValue: true
      - key: SERVICE_TOKEN_AUDIENCE
        value: stl-compliance-services

databases:
  - name: nexarr-db
    plan: basic-256mb
    databaseName: nexarr
    user: nexarr
  - name: staffarr-db
    plan: basic-256mb
    databaseName: staffarr
    user: staffarr
  - name: trainarr-db
    plan: basic-256mb
    databaseName: trainarr
    user: trainarr
  - name: maintainarr-db
    plan: basic-256mb
    databaseName: maintainarr
    user: maintainarr
  - name: routarr-db
    plan: basic-256mb
    databaseName: routarr
    user: routarr
  - name: supplyarr-db
    plan: basic-256mb
    databaseName: supplyarr
    user: supplyarr
  - name: compliancecore-db
    plan: basic-256mb
    databaseName: compliancecore
    user: compliancecore

services:
  - type: keyvalue
    name: redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: nexarr-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/nexarr-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - key: DATABASE_URL
        fromDatabase:
          name: nexarr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString

  - type: web
    name: staffarr-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/staffarr-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - key: DATABASE_URL
        fromDatabase:
          name: staffarr-db
          property: connectionString

  - type: web
