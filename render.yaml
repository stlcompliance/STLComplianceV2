# STL Compliance / Arr Suite — Render Blueprint (V1 hardened)
# Schema: https://render.com/schema/render.yaml.json
# Env reference: docs/deployment/ENV_VARS_V1.md

envVarGroups:
  - name: stl-shared
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: Information
      - key: OTEL_ENABLED
        value: "false"
      # Set OTEL_EXPORTER_OTLP_ENDPOINT in Dashboard when exporting to a collector.
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""
      - key: Cors__AllowedOriginPatterns
        value: https://*.stlcompliance.com

  - name: stl-auth
    envVars:
      - key: AUTH_SIGNING_KEY
        generateValue: true
      - key: SERVICE_TOKEN_SIGNING_KEY
        generateValue: true
      - key: Auth__Issuer
        value: stl-compliance-nexarr
      - key: Auth__Audience
        value: stl-compliance-suite
      - key: SERVICE_TOKEN_ISSUER
        value: stl-compliance-services
      - key: SERVICE_TOKEN_AUDIENCE
        value: stl-compliance-services
      - key: STL_INTEGRATION_BOOTSTRAP_SECRET
        generateValue: true

  - name: stl-ai-provider
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ASSISTANT_MODEL
        value: gpt-5.5
      - key: OPENAI_SMART_IMPORT_MODEL
        value: gpt-5.5
      - key: OPENAI_ASSISTANT_VECTOR_STORE_IDS
        sync: false
      - key: OPENAI_ASSISTANT_FILE_SEARCH_MAX_RESULTS
        value: "6"
      - key: OPENAI_REQUESTS_PER_MINUTE
        value: "500"
      - key: OPENAI_TOKENS_PER_MINUTE
        value: "500000"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "120"
      - key: OPENAI_RETRY_ATTEMPTS
        value: "5"

  # Server-to-server API URLs. These use the deployed Render HTTPS hosts because
  # Blueprint service names are not portable DNS aliases in every Render runtime.
  - name: stl-internal-api-urls
    envVars:
      - key: NexArr__BaseUrl
        value: https://nexarr-api-m78t.onrender.com
      - key: StaffArr__BaseUrl
        value: https://staffarr-api-6ki6.onrender.com
      - key: TrainArr__BaseUrl
        value: https://trainarr-api-6eww.onrender.com
      - key: MaintainArr__BaseUrl
        value: https://maintainarr-api-mgel.onrender.com
      - key: RoutArr__BaseUrl
        value: https://routarr-api-ua7l.onrender.com
      - key: SupplyArr__BaseUrl
        value: https://supplyarr-api-ytp0.onrender.com
      - key: ComplianceCore__BaseUrl
        value: https://compliancecore-api-pqyl.onrender.com
      - key: LoadArr__BaseUrl
        value: https://loadarr-api.onrender.com
      - key: AssurArr__BaseUrl
        value: https://assurarr-api.onrender.com
      - key: RecordArr__BaseUrl
        value: https://recordarr-api.onrender.com
      - key: CustomArr__BaseUrl
        value: https://customarr-api.onrender.com
      - key: OrdArr__BaseUrl
        value: https://ordarr-api.onrender.com
      - key: ReportArr__BaseUrl
        value: https://reportarr-api.onrender.com
  # Public bundled frontend URLs for browser builds and CORS.
  # Product URLs default to dedicated product subdomains.
  - name: stl-public-frontend-urls
    envVars:
      - key: APP_PUBLIC_BASE_URL
        value: https://app.stlcompliance.com
      - key: SUITE_FRONTEND_URL
        value: https://app.stlcompliance.com
