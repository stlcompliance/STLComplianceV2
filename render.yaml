      - key: STL_SERVICE_NAME
        value: staffarr-api
      - key: DATABASE_URL
        fromDatabase:
          name: staffarr-db
          property: connectionString
      - key: Cors__StaffArrFrontendOrigin
        value: https://app.stlcompliance.com
      - key: DocumentStorage__RootPath
