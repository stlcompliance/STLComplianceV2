  # --- Static frontends (Vite / React) ---
  - type: web
    name: stlcompliancesite
    runtime: static
    rootDir: apps/stlcompliancesite
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUITE_LOGIN_URL
        value: https://suite-frontend.onrender.com/login
      - key: VITE_CONTACT_EMAIL
        value: hello@stlcompliance.com
      - key: VITE_SITE_BASE_URL
        value: https://stlcompliancesite.onrender.com
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()

