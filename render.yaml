      name: staffarr-documents
      mountPath: /var/data/staffarr-documents
      sizeGB: 10
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - fromGroup: stl-internal-api-urls
      - key: STL_INTEGRATION_TOKEN_AUTO_PROVISION
