# STL Compliance / Arr Suite — Render Blueprint (V1 hardened)
# Schema: https://render.com/schema/render.yaml.json
# Env reference: docs/deployment/ENV_VARS_V1.md

envVarGroups:
  - name: stl-shared
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: Information
      - key: OTEL_ENABLED
        value: "false"
      # Set OTEL_EXPORTER_OTLP_ENDPOINT in Dashboard when exporting to a collector.
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""

  - name: stl-auth
    envVars:
      - key: AUTH_SIGNING_KEY
        generateValue: true
      - key: SERVICE_TOKEN_SIGNING_KEY
        generateValue: true
      - key: Auth__Issuer
        value: stl-compliance-nexarr
      - key: Auth__Audience
        value: stl-compliance-suite
      - key: SERVICE_TOKEN_ISSUER
        value: stl-compliance-services
      - key: SERVICE_TOKEN_AUDIENCE
        value: stl-compliance-services
      - key: STL_INTEGRATION_BOOTSTRAP_SECRET
        generateValue: true

  # Server-to-server API URLs. These use the deployed Render HTTPS hosts because
  # Blueprint service names are not portable DNS aliases in every Render runtime.
  - name: stl-internal-api-urls
    envVars:
      - key: NexArr__BaseUrl
        value: https://nexarr-api-4kk0.onrender.com
      - key: StaffArr__BaseUrl
        value: https://staffarr-api-r1kz.onrender.com
      - key: TrainArr__BaseUrl
        value: https://trainarr-api-hq62.onrender.com
      - key: MaintainArr__BaseUrl
        value: https://maintainarr-api-uzph.onrender.com
      - key: RoutArr__BaseUrl
        value: https://routarr-api-8oc7.onrender.com
      - key: SupplyArr__BaseUrl
        value: https://supplyarr-api-te1h.onrender.com
      - key: ComplianceCore__BaseUrl
        value: https://compliancecore-api-b6fs.onrender.com
      - key: LoadArr__BaseUrl
        value: https://loadarr-api.onrender.com
      - key: RecordArr__BaseUrl
        value: https://recordarr-api.onrender.com
  # Public bundled frontend URLs for browser builds and CORS.
  # These point at the stable app domain and product paths.
  - name: stl-public-frontend-urls
    envVars:
      - key: APP_PUBLIC_BASE_URL
        value: https://app.stlcompliance.com
      - key: SUITE_FRONTEND_URL
        value: https://app.stlcompliance.com
      - key: STAFFARR_FRONTEND_URL
        value: https://app.stlcompliance.com/staffarr
      - key: TRAINARR_FRONTEND_URL
        value: https://app.stlcompliance.com/trainarr
      - key: MAINTAINARR_FRONTEND_URL
        value: https://app.stlcompliance.com/maintainarr
      - key: ROUTARR_FRONTEND_URL
        value: https://app.stlcompliance.com/routarr
      - key: SUPPLYARR_FRONTEND_URL
        value: https://app.stlcompliance.com/supplyarr
      - key: COMPLIANCECORE_FRONTEND_URL
        value: https://app.stlcompliance.com/compliancecore
      - key: LOADARR_FRONTEND_URL
        value: https://app.stlcompliance.com/loadarr
      - key: FIELDCOMPANION_FRONTEND_URL
        value: https://fieldcompanion-frontend-vf7o.onrender.com
      - key: STLCOMPLIANCESITE_URL
        value: https://stlcompliancesite.onrender.com

  # Vite build-time product frontend bases for topbar ProductSwitcher launch URLs.
  # VITE_APP_PUBLIC_BASE_URL takes precedence and emits /{product}/launch targets.
  - name: stl-vite-product-frontend-urls
    envVars:
      - key: VITE_APP_PUBLIC_BASE_URL
        value: https://app.stlcompliance.com
      - key: VITE_STAFFARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/staffarr
      - key: VITE_TRAINARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/trainarr
      - key: VITE_MAINTAINARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/maintainarr
      - key: VITE_ROUTARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/routarr
      - key: VITE_SUPPLYARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/supplyarr
      - key: VITE_COMPLIANCECORE_FRONTEND_BASE
        value: https://app.stlcompliance.com/compliancecore
      - key: VITE_LOADARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/loadarr
      - key: VITE_RECORDARR_FRONTEND_BASE
        value: https://app.stlcompliance.com/recordarr
      - key: VITE_FIELDCOMPANION_FRONTEND_BASE
        value: https://fieldcompanion-frontend-vf7o.onrender.com

  - name: stl-public-api-urls
    envVars:
      - key: NEXARR_PUBLIC_API_URL
        value: https://nexarr-api-4kk0.onrender.com
      - key: STAFFARR_PUBLIC_API_URL
        value: https://staffarr-api-r1kz.onrender.com
      - key: TRAINARR_PUBLIC_API_URL
        value: https://trainarr-api-hq62.onrender.com
      - key: MAINTAINARR_PUBLIC_API_URL
        value: https://maintainarr-api-uzph.onrender.com
      - key: ROUTARR_PUBLIC_API_URL
        value: https://routarr-api-8oc7.onrender.com
      - key: SUPPLYARR_PUBLIC_API_URL
        value: https://supplyarr-api-te1h.onrender.com
      - key: COMPLIANCECORE_PUBLIC_API_URL
        value: https://compliancecore-api-b6fs.onrender.com
      - key: LOADARR_PUBLIC_API_URL
        value: https://loadarr-api.onrender.com
databases:
  - name: nexarr-db
    plan: basic-256mb
    databaseName: nexarr
    user: nexarr
  - name: staffarr-db
    plan: basic-256mb
    databaseName: staffarr
    user: staffarr
  - name: trainarr-db
    plan: basic-256mb
    databaseName: trainarr
    user: trainarr
  - name: maintainarr-db
    plan: basic-256mb
    databaseName: maintainarr
    user: maintainarr
  - name: routarr-db
    plan: basic-256mb
    databaseName: routarr
    user: routarr
  - name: supplyarr-db
    plan: basic-256mb
    databaseName: supplyarr
    user: supplyarr
  - name: compliancecore-db
    plan: basic-256mb
    databaseName: compliancecore
    user: compliancecore
  - name: loadarr-db
    plan: basic-256mb
    databaseName: loadarr
    user: loadarr

services:
  - type: keyvalue
    name: redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # --- APIs (Docker / .NET 10) ---
  - type: web
    name: nexarr-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/nexarr-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - fromGroup: stl-internal-api-urls
      - key: DATABASE_URL
        fromDatabase:
          name: nexarr-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString
      - key: Cors__SuiteFrontendOrigin
        value: https://app.stlcompliance.com
      - key: Cors__FieldCompanionFrontendOrigin
        value: https://fieldcompanion-frontend-vf7o.onrender.com
      - key: Launch__Products__nexarr__BaseUrl
        value: https://app.stlcompliance.com
      - key: Launch__Products__staffarr__BaseUrl
        value: https://app.stlcompliance.com/staffarr
      - key: Launch__Products__trainarr__BaseUrl
        value: https://app.stlcompliance.com/trainarr
      - key: Launch__Products__maintainarr__BaseUrl
        value: https://app.stlcompliance.com/maintainarr
      - key: Launch__Products__routarr__BaseUrl
        value: https://app.stlcompliance.com/routarr
      - key: Launch__Products__supplyarr__BaseUrl
        value: https://app.stlcompliance.com/supplyarr
      - key: Launch__Products__compliancecore__BaseUrl
        value: https://app.stlcompliance.com/compliancecore
      - key: Launch__Products__loadarr__BaseUrl
        value: https://app.stlcompliance.com/loadarr
      - key: Launch__Products__recordarr__BaseUrl
        value: https://recordarr-api.onrender.com
      - key: Launch__Products__staffarr__LaunchPath
        value: /launch
      - key: Launch__Products__trainarr__LaunchPath
        value: /launch
      - key: Launch__Products__maintainarr__LaunchPath
        value: /launch
      - key: Launch__Products__routarr__LaunchPath
        value: /launch
      - key: Launch__Products__supplyarr__LaunchPath
        value: /launch
      - key: Launch__Products__compliancecore__LaunchPath
        value: /launch
      - key: Launch__Products__loadarr__LaunchPath
        value: /launch
      - key: Launch__Products__recordarr__LaunchPath
        value: /launch
      - key: Launch__Products__fieldcompanion__BaseUrl
        value: https://fieldcompanion-frontend-vf7o.onrender.com
      - key: Launch__Products__fieldcompanion__LaunchPath
        value: /launch
      - key: FieldCompanionWebPush__Subject
        value: mailto:fieldcompanion-push@stlcompliance.com
      - key: FieldCompanionWebPush__PublicKey
        sync: false
      - key: FieldCompanionWebPush__PrivateKey
        sync: false

  - type: web
    name: staffarr-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/staffarr-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
