  # --- Marketing static site ---
  - type: web
    name: stlcompliancesite
    runtime: static
    rootDir: apps/stlcompliancesite
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    envVars:
      - key: VITE_SITE_BASE_URL
        value: https://stlcompliancesite.onrender.com
      - key: VITE_SUITE_LOGIN_URL
        value: https://app.stlcompliance.com/login

  # Frontend assets are bundled into the API Docker images now, except for
  # stlcompliancesite (standalone static site).
