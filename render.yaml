    databaseName: maintainarr
    user: maintainarr
  - name: routarr-db
    plan: basic-256mb
    databaseName: routarr
    user: routarr
  - name: supplyarr-db
    plan: basic-256mb
    databaseName: supplyarr
    user: supplyarr
  - name: compliancecore-db
    plan: basic-256mb
    databaseName: compliancecore
    user: compliancecore
  - name: loadarr-db
    plan: basic-256mb
    databaseName: loadarr
    user: loadarr
  - name: assurarr-db
    plan: basic-256mb
    databaseName: assurarr
    user: assurarr
  - name: customarr-db
    plan: basic-256mb
    databaseName: customarr
    user: customarr
  - name: ordarr-db
    plan: basic-256mb
    databaseName: ordarr
    user: ordarr

services:
  - type: keyvalue
    name: redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # --- APIs (Docker / .NET 10) ---
