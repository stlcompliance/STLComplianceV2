  # --- Product heartbeat workers (reserved for product-local jobs) ---
  - type: worker
    name: nexarr-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./workers/nexarr-worker/Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-auth
      - fromGroup: stl-internal-api-urls
      - key: STL_INTEGRATION_TOKEN_AUTO_PROVISION
        value: "true"
      - key: STL_SERVICE_NAME
        value: nexarr-worker
      - key: DATABASE_URL
        fromDatabase:
          name: nexarr-db
          property: connectionString
      - key: NexArrPlatformOutboxPublisher__NexArrBaseUrl
        value: https://app.stlcompliance.com
      - key: NexArrPlatformOutboxPublisher__ServiceToken
