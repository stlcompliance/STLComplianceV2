  # --- Standalone static sites ---
  - type: web
    name: fieldcompanion-frontend
    runtime: static
    rootDir: apps/fieldcompanion-frontend
    buildCommand: npm ci --prefix ../../packages/shared-ui && npm ci && npm run build
    staticPublishPath: dist
    domains:
      - fieldcompanion.stlcompliance.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    envVars:
      - fromGroup: stl-shared
      - fromGroup: stl-vite-product-frontend-urls
      - key: VITE_SUITE_URL
        value: https://app.stlcompliance.com
      - key: VITE_NEXARR_API_BASE
        value: https://app.stlcompliance.com

  - type: web
    name: stlcompliancesite
    runtime: static
    rootDir: apps/stlcompliancesite
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    domains:
      - stlcompliance.com
      - www.stlcompliance.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    envVars:
      - key: VITE_SITE_BASE_URL
        value: https://stlcompliance.com
      - key: VITE_SUITE_LOGIN_URL
        value: https://app.stlcompliance.com/login
      - key: VITE_KB_URL
        value: https://kb.stlcompliance.com

  - type: web
    name: stlcompliancekb
    runtime: static
    rootDir: apps/stlcompliancekb
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    domains:
      - kb.stlcompliance.com
