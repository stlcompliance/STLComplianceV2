name: E2E Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-api-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build STLCompliance.slnx -c Release

      - name: Start docker-compose APIs
        run: |
          docker compose up -d --build postgres nexarr-api staffarr-api trainarr-api maintainarr-api routarr-api supplyarr-api compliancecore-api assurarr-api
          echo "Waiting for API health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5101/health >/dev/null \
              && curl -sf http://localhost:5102/health >/dev/null \
              && curl -sf http://localhost:5107/health >/dev/null \
              && curl -sf http://localhost:5109/health >/dev/null; then
              echo "APIs healthy after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "API health timeout"
          docker compose ps
          exit 1

      - name: Live E2E (health, login, tenant isolation)
        env:
          E2E_LIVE: "1"
        run: dotnet test tests/STLCompliance.E2E/STLCompliance.E2E.csproj -c Release --no-build --filter "Category=Live" --verbosity normal

      - name: Live DR restore drill (seven product databases)
        env:
          DR_LIVE: "1"
          DR_POSTGRES_CONTAINER: stlcompliancev2-postgres-1
        run: dotnet test tests/STLCompliance.Dr.Tests/STLCompliance.Dr.Tests.csproj -c Release --no-build --filter "Category=Dr&Category=Live" --verbosity normal

      - name: Tear down
        if: always()
        run: docker compose down -v

  load-test-live:
    runs-on: ubuntu-latest
    needs: live-api-e2e
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build
        run: dotnet build STLCompliance.slnx -c Release

      - name: Start docker-compose APIs
        run: |
          docker compose up -d --build postgres nexarr-api staffarr-api trainarr-api maintainarr-api routarr-api supplyarr-api compliancecore-api assurarr-api
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5101/health >/dev/null \
              && curl -sf http://localhost:5102/health >/dev/null \
              && curl -sf http://localhost:5103/health >/dev/null \
              && curl -sf http://localhost:5104/health >/dev/null \
              && curl -sf http://localhost:5105/health >/dev/null \
              && curl -sf http://localhost:5106/health >/dev/null \
              && curl -sf http://localhost:5107/health >/dev/null \
              && curl -sf http://localhost:5109/health >/dev/null; then
              echo "All eight APIs healthy after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Live k6 load tests (all eleven PO scenarios)
        env:
          LOAD_LIVE: "1"
          STL_LOAD_SLO_PROFILE: product-owner
        run: dotnet test tests/STLCompliance.Load.Tests/STLCompliance.Load.Tests.csproj -c Release --no-build --filter "Category=Load&Category=Live" --verbosity normal

      - name: Tear down
        if: always()
        run: docker compose down -v

  playwright-smoke:
    runs-on: ubuntu-latest
    needs: live-api-e2e
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/suite-frontend/package-lock.json
            apps/staffarr-frontend/package-lock.json
            apps/trainarr-frontend/package-lock.json
            apps/compliancecore-frontend/package-lock.json
            apps/maintainarr-frontend/package-lock.json
            apps/supplyarr-frontend/package-lock.json
            apps/routarr-frontend/package-lock.json
            apps/assurarr-frontend/package-lock.json
            apps/companion-frontend/package-lock.json

      - name: Start docker-compose APIs
        run: |
          chmod +x scripts/ops/e2e-stack-up.sh scripts/ops/e2e-frontends-preview.sh
          ./scripts/ops/e2e-stack-up.sh --apis-only

      - name: Start all product frontend previews
        run: ./scripts/ops/e2e-frontends-preview.sh

      - name: Install Playwright
        working-directory: tests/e2e-playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright smoke
        env:
          E2E_LIVE: "1"
          E2E_SUITE_URL: http://127.0.0.1:5174
        working-directory: tests/e2e-playwright
        run: npm test

      - name: Tear down
        if: always()
        run: docker compose down -v
