name: Load Staging Render

on:
  schedule:
    - cron: "0 7 * * 0"
  workflow_dispatch:
    inputs:
      scenario:
        description: "k6 scenario key (empty = all eleven PO scenarios)"
        required: false
        default: ""
      vus:
        description: "Virtual users"
        required: false
        default: "5"
      duration:
        description: "Scenario duration (k6 format, e.g. 30s)"
        required: false
        default: "30s"
      skip_health_gate:
        description: "Skip pre-run /health gate"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    outputs:
      run_soak: ${{ steps.evaluate.outputs.run_soak }}
    steps:
      - name: Evaluate staging soak secrets
        id: evaluate
        env:
          RENDER_STAGING_NEXARR_API_URL: ${{ secrets.RENDER_STAGING_NEXARR_API_URL }}
          RENDER_STAGING_STAFFARR_API_URL: ${{ secrets.RENDER_STAGING_STAFFARR_API_URL }}
          RENDER_STAGING_TRAINARR_API_URL: ${{ secrets.RENDER_STAGING_TRAINARR_API_URL }}
          RENDER_STAGING_MAINTAINARR_API_URL: ${{ secrets.RENDER_STAGING_MAINTAINARR_API_URL }}
          RENDER_STAGING_ROUTARR_API_URL: ${{ secrets.RENDER_STAGING_ROUTARR_API_URL }}
          RENDER_STAGING_SUPPLYARR_API_URL: ${{ secrets.RENDER_STAGING_SUPPLYARR_API_URL }}
          RENDER_STAGING_COMPLIANCECORE_API_URL: ${{ secrets.RENDER_STAGING_COMPLIANCECORE_API_URL }}
        run: |
          missing=()
          for var in \
            RENDER_STAGING_NEXARR_API_URL \
            RENDER_STAGING_STAFFARR_API_URL \
            RENDER_STAGING_TRAINARR_API_URL \
            RENDER_STAGING_MAINTAINARR_API_URL \
            RENDER_STAGING_ROUTARR_API_URL \
            RENDER_STAGING_SUPPLYARR_API_URL \
            RENDER_STAGING_COMPLIANCECORE_API_URL
          do
            if [[ -z "${!var}" ]]; then
              missing+=("$var")
            fi
          done

          if ((${#missing[@]} > 0)); then
            echo "Render staging load soak skipped — missing secrets: ${missing[*]}"
            echo "run_soak=false" >> "$GITHUB_OUTPUT"
          else
            echo "Render staging load soak secrets ready."
            echo "run_soak=true" >> "$GITHUB_OUTPUT"
          fi

  staging-render-load-soak:
    needs: evaluate
    if: needs.evaluate.outputs.run_soak == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build
        run: dotnet build STLCompliance.slnx -c Release

      - name: Seed Compliance Core load-test journey fixtures
        env:
          RENDER_STAGING_NEXARR_API_URL: ${{ secrets.RENDER_STAGING_NEXARR_API_URL }}
          RENDER_STAGING_COMPLIANCECORE_API_URL: ${{ secrets.RENDER_STAGING_COMPLIANCECORE_API_URL }}
          STL_LOAD_DEMO_EMAIL: ${{ secrets.RENDER_STAGING_LOAD_DEMO_EMAIL }}
          STL_LOAD_DEMO_PASSWORD: ${{ secrets.RENDER_STAGING_LOAD_DEMO_PASSWORD }}
          STL_LOAD_DEMO_TENANT_ID: ${{ secrets.RENDER_STAGING_LOAD_DEMO_TENANT_ID }}
        run: |
          chmod +x scripts/ops/compliancecore-staging-journey-seed.sh
          ./scripts/ops/compliancecore-staging-journey-seed.sh

      - name: Seed TrainArr load-test journey qualification mirror
        env:
          RENDER_STAGING_NEXARR_API_URL: ${{ secrets.RENDER_STAGING_NEXARR_API_URL }}
          RENDER_STAGING_TRAINARR_API_URL: ${{ secrets.RENDER_STAGING_TRAINARR_API_URL }}
          STL_LOAD_DEMO_EMAIL: ${{ secrets.RENDER_STAGING_LOAD_DEMO_EMAIL }}
          STL_LOAD_DEMO_PASSWORD: ${{ secrets.RENDER_STAGING_LOAD_DEMO_PASSWORD }}
          STL_LOAD_DEMO_TENANT_ID: ${{ secrets.RENDER_STAGING_LOAD_DEMO_TENANT_ID }}
        run: |
          chmod +x scripts/ops/trainarr-staging-journey-seed.sh
          ./scripts/ops/trainarr-staging-journey-seed.sh

      - name: Seed RoutArr load-test journey dispatch trip mirror
        env:
          RENDER_STAGING_NEXARR_API_URL: ${{ secrets.RENDER_STAGING_NEXARR_API_URL }}
          RENDER_STAGING_ROUTARR_API_URL: ${{ secrets.RENDER_STAGING_ROUTARR_API_URL }}
          STL_LOAD_DEMO_EMAIL: ${{ secrets.RENDER_STAGING_LOAD_DEMO_EMAIL }}
          STL_LOAD_DEMO_PASSWORD: ${{ secrets.RENDER_STAGING_LOAD_DEMO_PASSWORD }}
          STL_LOAD_DEMO_TENANT_ID: ${{ secrets.RENDER_STAGING_LOAD_DEMO_TENANT_ID }}
        run: |
          chmod +x scripts/ops/routarr-staging-journey-seed.sh
          ./scripts/ops/routarr-staging-journey-seed.sh

      - name: Run Render staging load soak (product-owner SLOs)
        env:
          RENDER_STAGING_NEXARR_API_URL: ${{ secrets.RENDER_STAGING_NEXARR_API_URL }}
          RENDER_STAGING_STAFFARR_API_URL: ${{ secrets.RENDER_STAGING_STAFFARR_API_URL }}
          RENDER_STAGING_TRAINARR_API_URL: ${{ secrets.RENDER_STAGING_TRAINARR_API_URL }}
          RENDER_STAGING_MAINTAINARR_API_URL: ${{ secrets.RENDER_STAGING_MAINTAINARR_API_URL }}
          RENDER_STAGING_ROUTARR_API_URL: ${{ secrets.RENDER_STAGING_ROUTARR_API_URL }}
          RENDER_STAGING_SUPPLYARR_API_URL: ${{ secrets.RENDER_STAGING_SUPPLYARR_API_URL }}
          RENDER_STAGING_COMPLIANCECORE_API_URL: ${{ secrets.RENDER_STAGING_COMPLIANCECORE_API_URL }}
          STL_LOAD_DEMO_EMAIL: ${{ secrets.RENDER_STAGING_LOAD_DEMO_EMAIL }}
          STL_LOAD_DEMO_PASSWORD: ${{ secrets.RENDER_STAGING_LOAD_DEMO_PASSWORD }}
          STL_LOAD_DEMO_TENANT_ID: ${{ secrets.RENDER_STAGING_LOAD_DEMO_TENANT_ID }}
          STL_LOAD_SUBJECT_PERSON_ID: ${{ secrets.RENDER_STAGING_LOAD_SUBJECT_PERSON_ID }}
          STL_LOAD_QUALIFICATION_KEY: ${{ secrets.RENDER_STAGING_LOAD_QUALIFICATION_KEY }}
          STL_LOAD_RULE_PACK_KEY: ${{ secrets.RENDER_STAGING_LOAD_RULE_PACK_KEY }}
          RENDER_STAGING_LOAD_OUTPUT_DIRECTORY: ${{ runner.temp }}/render-staging-load
          RENDER_STAGING_SKIP_HEALTH_GATE: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_health_gate || 'false' }}
        run: |
          chmod +x scripts/ops/render-staging-load-soak.sh scripts/ops/load-test-run.sh
          scenario="${{ github.event_name == 'workflow_dispatch' && inputs.scenario || 'all' }}"
          if [[ -z "$scenario" ]]; then
            scenario="all"
          fi
          STL_LOAD_VUS="${{ github.event_name == 'workflow_dispatch' && inputs.vus || '5' }}" \
          STL_LOAD_DURATION="${{ github.event_name == 'workflow_dispatch' && inputs.duration || '30s' }}" \
            ./scripts/ops/render-staging-load-soak.sh "$scenario"

      - name: Upload k6 summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-staging-load-summaries-${{ github.run_id }}
          path: ${{ runner.temp }}/render-staging-load
          if-no-files-found: ignore
