name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore STLCompliance.slnx

      - name: Build
        run: dotnet build STLCompliance.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test STLCompliance.slnx --configuration Release --no-build --verbosity normal --filter "Category!=Live"

      - name: OpenAPI parity
        run: dotnet test tests/STLCompliance.OpenApi.Tests/STLCompliance.OpenApi.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category=OpenApi"

      - name: OTEL smoke checks
        run: dotnet test tests/STLCompliance.Otel.Tests/STLCompliance.Otel.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category=Otel"

      - name: EF migrations present
        run: |
          test -f apps/nexarr-api/NexArr.Api/Migrations/*InitialPlatformFoundation*.cs
          test -f apps/staffarr-api/StaffArr.Api/Migrations/*InitialPlatformFoundation*.cs
          test -f apps/compliancecore-api/ComplianceCore.Api/Migrations/*InitialPlatformFoundation*.cs

  suite-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/suite-frontend/package-lock.json

      - name: Install
        working-directory: apps/suite-frontend
        run: npm ci

      - name: Build
        working-directory: apps/suite-frontend
        run: npm run build

      - name: Test
        working-directory: apps/suite-frontend
        run: npm test
