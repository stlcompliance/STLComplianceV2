name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore STLCompliance.slnx

      - name: Build
        run: dotnet build STLCompliance.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test STLCompliance.slnx --configuration Release --no-build --verbosity normal

      - name: EF migrations present
        run: |
          test -f apps/nexarr-api/NexArr.Api/Migrations/*InitialPlatformFoundation*.cs
          test -f apps/staffarr-api/StaffArr.Api/Migrations/*InitialPlatformFoundation*.cs
          test -f apps/compliancecore-api/ComplianceCore.Api/Migrations/*InitialPlatformFoundation*.cs
