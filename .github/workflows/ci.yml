name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore STLCompliance.slnx

      - name: Build
        run: dotnet build STLCompliance.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test STLCompliance.slnx --configuration Release --no-build --verbosity normal --filter "Category!=Live"

      - name: OpenAPI parity
        run: dotnet test tests/STLCompliance.OpenApi.Tests/STLCompliance.OpenApi.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category=OpenApi"

      - name: OTEL smoke checks
        run: dotnet test tests/STLCompliance.Otel.Tests/STLCompliance.Otel.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category=Otel"

      - name: DR restore drill checks
        run: dotnet test tests/STLCompliance.Dr.Tests/STLCompliance.Dr.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category=Dr&Category!=Live"

      - name: Load test harness checks
        run: dotnet test tests/STLCompliance.Load.Tests/STLCompliance.Load.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category=Load&Category!=Live"

      - name: CI frontend catalog checks
        run: dotnet test tests/STLCompliance.E2E/STLCompliance.E2E.csproj --configuration Release --no-build --verbosity normal --filter "Category=Ci&Area=Frontend"

      - name: Render blueprint catalog checks
        run: dotnet test tests/STLCompliance.E2E/STLCompliance.E2E.csproj --configuration Release --no-build --verbosity normal --filter "Category=Ci&Area=RenderBlueprint"

      - name: Render staging ship gate catalog checks
        run: dotnet test tests/STLCompliance.E2E/STLCompliance.E2E.csproj --configuration Release --no-build --verbosity normal --filter "Category=Ci&Area=RenderStagingShipGate"

      - name: EF migrations present
        run: |
          set -euo pipefail
          mapfile -t migration_dirs < <(find apps -type d -name Migrations | sort)
          if [ "${#migration_dirs[@]}" -eq 0 ]; then
            echo "No EF migrations directories found." >&2
            exit 1
          fi

          for migration_dir in "${migration_dirs[@]}"; do
            if ! find "$migration_dir" -maxdepth 1 -type f -name '*.cs' \
              ! -name '*.Designer.cs' ! -name '*ModelSnapshot.cs' | grep -q .; then
              echo "No EF migration files found in $migration_dir" >&2
              exit 1
            fi
          done

  stlcompliancesite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/stlcompliancesite/package-lock.json

      - name: Install
        working-directory: apps/stlcompliancesite
        run: npm ci

      - name: Build
        working-directory: apps/stlcompliancesite
        run: npm run build

      - name: Test
        working-directory: apps/stlcompliancesite
        run: npm test

