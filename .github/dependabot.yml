# Dependabot configuration (https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file)
#
# Version updates: defined below (scheduled pull requests).
# Security updates: not configured in this file. When Dependabot is enabled for the
# repository (Settings → Code security and analysis → Dependabot), GitHub opens separate
# PRs for known vulnerabilities as they are published. Security PRs are not blocked by
# version-update schedules or groups; they take precedence over open-pull-requests-limit.
#
# Labels: each update entry uses dependabot:<product-key> (and dependabot:dotnet + dependabot:monorepo
# for root NuGet) so PRs can be filtered by suite product or area.
#
version: 2
updates:
  # --- GitHub Actions (.github/workflows) ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependabot:github-actions
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch

  # --- NuGet (.NET monorepo: STLCompliance.slnx at repository root) ---
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependabot:dotnet
      - dependabot:monorepo
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

